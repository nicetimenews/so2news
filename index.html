<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Новости, турнирные статьи, слухи, обновления и команды по Standoff 2." />
  <meta property="og:title" content="Standoff 2 News Hub" />
  <meta property="og:description" content="Новости, турниры, команды и обновления по Standoff 2." />
  <meta property="og:type" content="website" />
  <title>Standoff 2 cybersport and news</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-MJ8SBJGNZK"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-MJ8SBJGNZK');
  </script>

  <style>
    :root {
      --bg: #050b16;
      --bg2: #071423;
      --panel: rgba(9, 18, 34, 0.96);
      --line: rgba(120, 170, 255, 0.18);
      --line-strong: rgba(96, 155, 255, 0.35);
      --text: #f3f7ff;
      --muted: #a8b7d6;
      --blue: #2f7bff;
      --blue2: #61a4ff;
      --blue3: #0f63ff;
      --white: #ffffff;
      --shadow: 0 18px 60px rgba(0, 0, 0, 0.45);
      --radius: 6px;
      --radius-lg: 6px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 0% 0%, rgba(47, 123, 255, 0.22), transparent 28%),
        radial-gradient(circle at 100% 10%, rgba(97, 164, 255, 0.14), transparent 24%),
        linear-gradient(180deg, var(--bg), var(--bg2));
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }
    button, input, select { font: inherit; }

    .app {
      width: min(1200px, calc(100% - 20px));
      margin: 0 auto;
      padding: 12px 0 20px;
      display: grid;
      gap: 16px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(14px);
    }

    .ticker-bar {
      position: sticky;
      top: 0;
      z-index: 80;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
    }

    .ticker-label {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 6px;
      background: linear-gradient(135deg, rgba(47, 123, 255, 0.24), rgba(255,255,255,0.04));
      border: 1px solid rgba(97, 164, 255, 0.24);
      color: #eaf2ff;
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 800;
      white-space: nowrap;
    }

    .ticker-viewport {
      flex: 1;
      overflow: hidden;
      mask-image: linear-gradient(90deg, transparent, black 6%, black 94%, transparent);
      -webkit-mask-image: linear-gradient(90deg, transparent, black 6%, black 94%, transparent);
    }

    .ticker-track {
      display: flex;
      width: max-content;
      animation: ticker-scroll 36s linear infinite;
    }

    .ticker-group {
      display: flex;
      align-items: center;
      gap: 28px;
      padding-right: 28px;
      white-space: nowrap;
    }

    .ticker-item {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #ecf4ff;
      font-size: 13px;
      line-height: 1;
      white-space: nowrap;
    }

    .ticker-item strong {
      color: #ffffff;
      font-weight: 700;
    }

    .ticker-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--blue2);
      box-shadow: 0 0 14px rgba(97, 164, 255, 0.55);
      flex: 0 0 auto;
    }

    .tg-link {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 6px;
      border: 1px solid rgba(97, 164, 255, 0.24);
      background: linear-gradient(135deg, rgba(47, 123, 255, 0.20), rgba(255,255,255,0.04));
      color: #eef4ff;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
      transition: transform .15s ease, border-color .15s ease, background .15s ease;
    }

    .tg-link:hover {
      transform: translateY(-1px);
      border-color: rgba(97, 164, 255, 0.45);
      background: linear-gradient(135deg, rgba(47, 123, 255, 0.28), rgba(255,255,255,0.06));
    }

    .tg-icon {
      width: 18px;
      height: 18px;
      display: inline-block;
      flex: 0 0 auto;
    }

    .topbar {
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .brand h1 span {
      background: linear-gradient(90deg, #d8e9ff, #61a4ff, #2f7bff);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: shine 7s linear infinite;
    }

    .brand small {
      display: block;
      margin-top: 8px;
      color: #bfd0f0;
      letter-spacing: 0.26em;
      font-size: 11px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 12px;
      align-items: center;
    }

    .search, .select {
      width: 100%;
      border: 1px solid rgba(120, 170, 255, 0.20);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      border-radius: 6px;
      padding: 12px 14px;
      outline: none;
      transition: box-shadow .15s ease, border-color .15s ease, background .15s ease;
    }

    .search::placeholder { color: #90a3c7; }
    .search:focus, .select:focus {
      border-color: rgba(97, 164, 255, 0.9);
      box-shadow: 0 0 0 3px rgba(47, 123, 255, 0.18);
      background: rgba(255,255,255,0.06);
    }

    .main-tabs, .category-tabs, .teams-mini-tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .tab {
      border: 1px solid rgba(120, 170, 255, 0.20);
      background: rgba(255,255,255,0.04);
      color: #eef4ff;
      border-radius: 6px;
      padding: 10px 15px;
      cursor: pointer;
      transition: .15s ease;
      font-size: 13px;
      white-space: nowrap;
    }

    .tab:hover {
      transform: translateY(-1px);
      border-color: rgba(97, 164, 255, 0.35);
      background: rgba(47, 123, 255, 0.10);
    }

    .tab.active {
      background: linear-gradient(135deg, rgba(47, 123, 255, 0.24), rgba(255,255,255,0.05));
      border-color: rgba(97, 164, 255, 0.45);
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 2px;
    }

    .section-head h3 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .section-head small { color: var(--muted); }

    .status {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .content-panel {
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .news-grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .news-card {
      overflow: hidden;
      border-radius: 6px;
      border: 1px solid rgba(120, 170, 255, 0.18);
      background: rgba(255,255,255,0.03);
      transition: transform .15s ease, border-color .15s ease, background .15s ease, box-shadow .15s ease;
      cursor: pointer;
    }

    .news-card:hover {
      transform: translateY(-2px);
      border-color: rgba(97, 164, 255, 0.40);
      background: rgba(255,255,255,0.05);
      box-shadow: 0 0 0 1px rgba(97,164,255,.25), 0 12px 40px rgba(47,123,255,.18);
    }

    .news-card .img {
      width: 100%;
      aspect-ratio: 16 / 9;
      display: block;
      object-fit: contain;
      object-position: center;
      background: linear-gradient(180deg, #07101f, #0a1730);
      border-bottom: 1px solid rgba(120, 170, 255, 0.14);
    }

    .news-card .body {
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .news-card .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 6px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(120, 170, 255, 0.16);
      color: #eef4ff;
      font-size: 12px;
    }

    .news-card h4 {
      margin: 0;
      font-size: 18px;
      line-height: 1.22;
    }

    .news-card p {
      margin: 0;
      color: #c9d8ef;
      line-height: 1.65;
      font-size: 14px;
    }

    .news-foot {
      color: var(--muted);
      font-size: 12px;
    }

    .compact .news-card {
      display: grid;
      grid-template-columns: 160px minmax(0, 1fr);
    }

    .compact .news-card .img {
      aspect-ratio: auto;
      height: 100%;
      min-height: 145px;
    }

    .empty {
      padding: 22px;
      border: 1px dashed rgba(120, 170, 255, 0.22);
      border-radius: 6px;
      color: var(--muted);
      background: rgba(255,255,255,0.03);
      text-align: center;
      line-height: 1.7;
    }

    .teams-layout {
      display: grid;
      gap: 16px;
    }

    .teams-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .team-card {
      border: 1px solid rgba(120, 170, 255, 0.18);
      background: rgba(255,255,255,0.03);
      border-radius: 6px;
      padding: 14px;
      cursor: pointer;
      transition: transform .15s ease, border-color .15s ease, background .15s ease, box-shadow .15s ease;
      display: grid;
      gap: 12px;
      min-height: 170px;
    }

    .team-card:hover {
      transform: translateY(-2px);
      border-color: rgba(97, 164, 255, 0.35);
      background: rgba(255,255,255,0.05);
      box-shadow: 0 0 0 1px rgba(97,164,255,.2), 0 10px 30px rgba(0,0,0,.18);
    }

    .team-card.active {
      border-color: rgba(97, 164, 255, 0.60);
      background: linear-gradient(135deg, rgba(47, 123, 255, 0.16), rgba(255,255,255,0.04));
      box-shadow: 0 0 0 1px rgba(97,164,255,.18);
    }

    .team-head {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .team-badge {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-weight: 800;
      letter-spacing: .04em;
      color: #fff;
      background: linear-gradient(135deg, rgba(47,123,255,.95), rgba(97,164,255,.45));
      box-shadow: 0 12px 24px rgba(47,123,255,.20);
      flex: 0 0 auto;
    }

    .team-card h4 {
      margin: 0;
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: .02em;
    }

    .team-card small {
      color: var(--muted);
      display: block;
      margin-top: 4px;
      font-size: 12px;
    }

    .team-card p {
      margin: 0;
      color: #d6e2f5;
      line-height: 1.6;
      font-size: 13px;
      min-height: 42px;
    }

    .team-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .team-feed-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding-top: 2px;
    }

    .team-feed-head h4 {
      margin: 0;
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: .03em;
    }

    .team-feed-head small {
      color: var(--muted);
    }

    .footer {
      color: var(--muted);
      text-align: center;
      font-size: 13px;
      line-height: 1.65;
      padding: 4px 0 8px;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(10px);
      z-index: 100;
      padding: 16px;
    }
    .overlay.open { display: flex; }

    .modal {
      width: min(920px, 100%);
      max-height: 92vh;
      overflow: auto;
      background: #091220;
      border-radius: 6px;
      border: 1px solid rgba(120, 170, 255, 0.18);
      box-shadow: var(--shadow);
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 16px 18px;
      border-bottom: 1px solid rgba(120, 170, 255, 0.14);
    }

    .modal-head h4 {
      margin: 0;
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: .03em;
    }

    .close {
      width: 42px;
      height: 42px;
      border: 1px solid rgba(120, 170, 255, 0.18);
      border-radius: 6px;
      background: #f5f8ff;
      color: #10213b;
      font-weight: 900;
      cursor: pointer;
    }

    .modal-body { padding: 18px; }

    .modal-img {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: contain;
      object-position: center;
      border-radius: 6px;
      border: 1px solid rgba(120, 170, 255, 0.16);
      background: linear-gradient(180deg, #07101f, #0a1730);
      margin-bottom: 16px;
    }

    .modal-title {
      margin: 0 0 10px;
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1.1;
    }

    .modal-text {
      margin: 0;
      color: #dce6f7;
      line-height: 1.9;
      white-space: pre-wrap;
    }

    @keyframes ticker-scroll {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    @keyframes shine {
      to { background-position: 200% center; }
    }

    @media (max-width: 980px) {
      .teams-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 900px) {
      .ticker-bar {
        gap: 10px;
        padding: 10px 12px;
      }

      .tg-link span:last-child {
        display: none;
      }

      .controls { grid-template-columns: 1fr; }
      .news-grid { grid-template-columns: 1fr; }
      .compact .news-card { grid-template-columns: 1fr; }
      .teams-grid { grid-template-columns: 1fr; }
      .team-feed-head { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="panel ticker-bar">
      <div class="ticker-label">Breaking News</div>
      <div class="ticker-viewport" aria-label="Лента новостей">
        <div class="ticker-track">
          <div class="ticker-group" id="tickerGroup"></div>
          <div class="ticker-group" id="tickerGroupClone" aria-hidden="true"></div>
        </div>
      </div>
      <a class="tg-link" href="https://t.me/ntimenews" target="_blank" rel="noopener noreferrer" aria-label="Telegram канал">
        <svg class="tg-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M21.7 4.8c.2-.8-.5-1.4-1.2-1.2L3.6 9.9c-.9.3-.9 1.6.1 1.9l4.3 1.4 1.7 5.3c.3.9 1.5 1.1 2.1.4l2.6-2.9 4.5 3.2c.7.5 1.7.1 1.9-.8l1.9-13.6ZM8.6 12.2l9.8-6.1-7.6 7.2-.3 3-1.5-4.1-.4-.1Z" fill="currentColor"/>
        </svg>
        <span>Telegram канал</span>
      </a>
    </section>

    <section class="panel topbar">
      <div class="brand">
        <h1><span>NEWS</span> HUB</h1>
        <small>ARTICLES</small>
      </div>

      <div class="controls">
        <input class="search" id="searchInput" type="search" placeholder="Поиск по статьям и командам..." />
        <select class="select" id="sortSelect">
          <option value="newest">Сначала новые</option>
          <option value="oldest">Сначала старые</option>
        </select>
      </div>

      <div class="main-tabs" id="mainTabs"></div>
      <div class="category-tabs" id="categoryTabs"></div>
      <div class="status" id="statusText">Чтение файла news-index.json...</div>
    </section>

    <section class="panel content-panel" id="contentPanel">
      <div class="section-head">
        <div>
          <h3 id="sectionTitle">Статьи и новости</h3>
          <small id="sectionSubtitle">Выбирай категорию, ищи по тексту и открывай полную статью</small>
        </div>
        <button class="tab" id="toggleLayoutBtn" type="button">Компактно</button>
      </div>

      <div id="contentArea"></div>
    </section>

    <div class="footer">
      Standoff 2 News Hub • Новости, турниры, слухи, обновления и команды
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="modal-head">
        <div>
          <h4 id="modalKicker">Статья</h4>
        </div>
        <button class="close" id="closeModal" type="button">×</button>
      </div>
      <div class="modal-body">
        <img class="modal-img" id="modalImg" alt="Статья" />
        <h3 class="modal-title" id="modalTitle">Заголовок</h3>
        <p class="modal-text" id="modalText">Текст статьи.</p>
      </div>
    </div>
  </div>

  <script>
    const categories = [
      { id: 'all', label: 'Все' },
      { id: 'news', label: 'Новости' },
      { id: 'updates', label: 'Обновления' },
      { id: 'tournaments', label: 'Турниры' },
      { id: 'rumors', label: 'Слухи' },
      { id: 'guides', label: 'Гайды' },
    ];

    const teams = [
      { id: 'virtuspro', label: 'virtus.pro' },
      { id: 'maverick', label: 'Maverick' },
      { id: 'rgg', label: 'RGG' },
      { id: 'mafiozy', label: 'Mafiozy' },
      { id: 'cybershoke', label: 'Cybershoke' },
      { id: 'eclipsing', label: 'Eclipsing' },
      { id: 'xteam', label: 'XTeam' },
      { id: 'vozwooden', label: 'VozWooden' },
      { id: 'cyberhero', label: 'CyberHero' },
      { id: 'yesteam', label: 'yes team' },
      { id: 'cyberteam', label: 'Cyber Team' },
    ];

    const teamMap = Object.fromEntries(teams.map(team => [team.id, team]));

    const state = {
      posts: [],
      visible: [],
      view: 'news',
      currentFilter: 'all',
      selectedTeam: 'all',
      compact: false,
    };

    const els = {
      mainTabs: document.getElementById('mainTabs'),
      categoryTabs: document.getElementById('categoryTabs'),
      searchInput: document.getElementById('searchInput'),
      sortSelect: document.getElementById('sortSelect'),
      toggleLayoutBtn: document.getElementById('toggleLayoutBtn'),
      statusText: document.getElementById('statusText'),
      sectionTitle: document.getElementById('sectionTitle'),
      sectionSubtitle: document.getElementById('sectionSubtitle'),
      contentArea: document.getElementById('contentArea'),
      overlay: document.getElementById('overlay'),
      closeModal: document.getElementById('closeModal'),
      modalKicker: document.getElementById('modalKicker'),
      modalTitle: document.getElementById('modalTitle'),
      modalText: document.getElementById('modalText'),
      modalImg: document.getElementById('modalImg'),
      tickerGroup: document.getElementById('tickerGroup'),
      tickerGroupClone: document.getElementById('tickerGroupClone'),
    };

    function esc(text) {
      return String(text ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function imgFallback(label = 'News') {
      return 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
          <defs>
            <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0%" stop-color="#07101f" />
              <stop offset="100%" stop-color="#123a8a" />
            </linearGradient>
          </defs>
          <rect width="1200" height="675" fill="url(#g)" />
          <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#fff" font-size="46" font-family="Arial" font-weight="700">${esc(label)}</text>
        </svg>
      `);
    }

    function normalizeCategory(cat) {
      const c = String(cat || '').toLowerCase().trim();
      const map = {
        'новости': 'news',
        'news': 'news',
        'обновления': 'updates',
        'updates': 'updates',
        'турниры': 'tournaments',
        'tournaments': 'tournaments',
        'слухи': 'rumors',
        'rumors': 'rumors',
        'гайды': 'guides',
        'guides': 'guides'
      };
      return map[c] || 'news';
    }

    function categoryLabel(cat) {
      const found = categories.find(c => c.id === cat);
      return found ? found.label : 'Новости';
    }

    function teamLabel(id) {
      return teamMap[id]?.label || id;
    }

    function teamInitials(label) {
      const parts = String(label || '')
        .replace(/[^\p{L}\p{N}\. ]/gu, ' ')
        .split(/[\s\.]+/)
        .filter(Boolean);
      const letters = parts.map(part => part[0]).join('').slice(0, 2).toUpperCase();
      return letters || 'TM';
    }

    function toArray(data) {
      if (Array.isArray(data)) return data;
      if (data && typeof data === 'object') return [data];
      return [];
    }

    function flattenLoadedData(data) {
      const output = [];
      const items = toArray(data);
      for (const item of items) {
        if (Array.isArray(item)) {
          output.push(...flattenLoadedData(item));
        } else if (item && typeof item === 'object') {
          output.push(item);
        }
      }
      return output;
    }

    function normalizeForMatch(text) {
      return String(text || '')
        .toLowerCase()
        .replace(/ё/g, 'е')
        .replace(/[^a-z0-9а-я._\s-]/gi, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function slugForTeam(text) {
      return String(text || '')
        .toLowerCase()
        .replace(/ё/g, 'е')
        .replace(/[^a-z0-9а-я]/gi, '');
    }

    function extractTeamIds(text) {
      const source = String(text || '');
      const normalizedSource = slugForTeam(source);
      const hashtags = [...source.matchAll(/#([^\s#]+)/g)].map(match => slugForTeam(match[1]));
      const found = new Set();

      for (const team of teams) {
        if (hashtags.includes(team.id)) {
          found.add(team.id);
          continue;
        }
        if (normalizedSource.includes(team.id)) {
          found.add(team.id);
        }
      }

      return [...found];
    }

    function getSortTime(post) {
      return new Date(post.date || post.createdAt || 0).getTime() || 0;
    }

    function todayIso() {
      try {
        return new Intl.DateTimeFormat('en-CA', {
          timeZone: 'Asia/Almaty',
          year: 'numeric',
          month: '2-digit',
          day: '2-digit'
        }).format(new Date());
      } catch {
        return new Date().toISOString().slice(0, 10);
      }
    }

    function buildPost(item, i) {
      const title = String(item.title || '').trim();
      const category = normalizeCategory(item.category);
      const date = String(item.date || '').trim();
      const excerpt = String(item.excerpt || item.short || '').trim();
      const content = String(item.content || item.text || '').trim();
      const image = String(item.image || '').trim();
      const author = String(item.author || '').trim();
      const teamIds = extractTeamIds([title, excerpt, content, author].join(' '));

      return {
        id: String(item.id || `post-${i + 1}`),
        title,
        category,
        date,
        excerpt,
        content,
        image,
        author,
        teamIds,
      };
    }

    function setPosts(data, statusText) {
      state.posts = flattenLoadedData(data)
        .map((item, i) => buildPost(item, i))
        .filter(p => p.title || p.excerpt || p.content);

      const taggedCount = state.posts.filter(p => p.teamIds.length).length;
      els.statusText.textContent = `${statusText}: ${state.posts.length} статей • ${taggedCount} с командами`;
      renderAll();
    }

    async function fetchJsonSafe(url) {
      const response = await fetch(url, { cache: 'no-store' });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      return response.json();
    }

    async function loadAllPosts() {
      els.statusText.textContent = 'Чтение news-index.json...';
      try {
        const indexData = await fetchJsonSafe('./news-index.json?v=' + Date.now());
        const files = Array.isArray(indexData) ? indexData : [];

        if (!files.length) {
          state.posts = [];
          els.statusText.textContent = 'news-index.json пустой';
          renderAll();
          return;
        }

        const allPosts = [];
        for (const rawFile of files) {
          const file = String(rawFile || '').trim();
          if (!file) continue;
          try {
            const data = await fetchJsonSafe(`./${encodeURI(file)}?v=${Date.now()}`);
            allPosts.push(...flattenLoadedData(data));
          } catch (err) {
            console.error('Не удалось прочитать файл:', file, err);
          }
        }

        setPosts(allPosts, `Загружено файлов: ${files.length}`);
      } catch (err) {
        console.error(err);
        try {
          const fallback = await fetchJsonSafe('./news.json?v=' + Date.now());
          setPosts(fallback, 'Загружен news.json');
        } catch (err2) {
          console.error(err2);
          state.posts = [];
          els.statusText.textContent = 'Не удалось прочитать новости';
          renderAll();
        }
      }
    }

    function renderMainTabs() {
      els.mainTabs.innerHTML = `
        <button class="tab ${state.view === 'news' ? 'active' : ''}" type="button" data-view="news">Новости</button>
        <button class="tab ${state.view === 'teams' ? 'active' : ''}" type="button" data-view="teams">Команды</button>
      `;
    }

    function renderCategoryTabs() {
      els.categoryTabs.innerHTML = categories.map(c => `
        <button class="tab ${c.id === state.currentFilter ? 'active' : ''}" type="button" data-filter="${c.id}">${esc(c.label)}</button>
      `).join('');
      els.categoryTabs.style.display = state.view === 'news' ? 'flex' : 'none';
    }

    function filteredPostsForNews() {
      const q = normalizeForMatch(els.searchInput.value);
      return state.posts.filter(p => {
        const catOk = state.currentFilter === 'all' || p.category === state.currentFilter;
        const text = normalizeForMatch([p.title, p.excerpt, p.content, p.date, categoryLabel(p.category), p.author].join(' '));
        const searchOk = !q || text.includes(q);
        return catOk && searchOk;
      }).sort((a, b) => {
        const da = getSortTime(a);
        const db = getSortTime(b);
        return els.sortSelect.value === 'oldest' ? da - db : db - da;
      });
    }

    function filteredPostsForTeam(teamId) {
      const q = normalizeForMatch(els.searchInput.value);
      return state.posts.filter(p => {
        const hasTeam = p.teamIds.includes(teamId);
        const text = normalizeForMatch([p.title, p.excerpt, p.content, p.date, categoryLabel(p.category), p.author, ...p.teamIds.map(teamLabel)].join(' '));
        const searchOk = !q || text.includes(q);
        return hasTeam && searchOk;
      }).sort((a, b) => {
        const da = getSortTime(a);
        const db = getSortTime(b);
        return els.sortSelect.value === 'oldest' ? da - db : db - da;
      });
    }

    function filteredTeamPosts() {
      const q = normalizeForMatch(els.searchInput.value);
      const base = state.posts.filter(p => p.teamIds.length > 0);
      const selected = state.selectedTeam === 'all'
        ? base
        : base.filter(p => p.teamIds.includes(state.selectedTeam));

      return selected.filter(p => {
        const text = normalizeForMatch([p.title, p.excerpt, p.content, p.date, categoryLabel(p.category), p.author, ...p.teamIds.map(teamLabel)].join(' '));
        return !q || text.includes(q);
      }).sort((a, b) => {
        const da = getSortTime(a);
        const db = getSortTime(b);
        return els.sortSelect.value === 'oldest' ? da - db : db - da;
      });
    }

    function renderPostGrid(list) {
      if (!list.length) {
        return '<div class="empty" style="grid-column:1/-1;">Статей пока нет или они не подходят под фильтр.</div>';
      }

      return `<div class="news-grid ${state.compact ? 'compact' : ''}">` + list.map((p, index) => `
        <article class="news-card" data-post-index="${index}">
          <img loading="lazy" class="img" src="${esc(p.image || imgFallback(p.title || 'News'))}" alt="${esc(p.title)}" onerror="this.src='${imgFallback(p.title || 'News')}'" />
          <div class="body">
            <div class="meta">
              <span class="pill">${esc(categoryLabel(p.category))}</span>
              ${p.date ? `<span class="pill">${esc(p.date)}</span>` : ''}
              ${p.author ? `<span class="pill">${esc(p.author)}</span>` : ''}
            </div>
            <h4>${esc(p.title)}</h4>
            <p>${esc(p.excerpt || p.content || '')}</p>
            ${p.teamIds.length ? `<div class="team-tags">${p.teamIds.map(id => `<span class="pill">#${esc(teamLabel(id))}</span>`).join('')}</div>` : ''}
            <div class="news-foot">Нажми, чтобы открыть статью</div>
          </div>
        </article>
      `).join('') + '</div>';
    }

    function renderNewsView() {
      const list = filteredPostsForNews();
      state.visible = list;
      els.sectionTitle.textContent = 'Статьи и новости';
      els.sectionSubtitle.textContent = 'Выбирай категорию, ищи по тексту и открывай полную статью';
      els.toggleLayoutBtn.style.display = 'inline-flex';
      els.contentArea.innerHTML = renderPostGrid(list);
      els.statusText.textContent = `Показано ${list.length} из ${state.posts.length} статей`;
    }

    function renderTeamsView() {
      const q = normalizeForMatch(els.searchInput.value);
      const teamCards = teams.filter(team => {
        if (!q) return true;
        const teamPosts = state.posts.filter(p => p.teamIds.includes(team.id));
        const text = normalizeForMatch([team.label, ...teamPosts.map(p => [p.title, p.excerpt, p.content].join(' '))].join(' '));
        return text.includes(q);
      });

      const selectedPosts = state.selectedTeam === 'all' ? filteredTeamPosts() : filteredPostsForTeam(state.selectedTeam);
      state.visible = selectedPosts;

      els.sectionTitle.textContent = 'Команды';
      els.sectionSubtitle.textContent = 'Автоматическая привязка новостей по хештегам из short, title и content';
      els.toggleLayoutBtn.style.display = 'inline-flex';

      const selectedLabel = state.selectedTeam === 'all' ? 'Все команды' : teamLabel(state.selectedTeam);
      const selectedCount = state.selectedTeam === 'all'
        ? state.posts.filter(p => p.teamIds.length > 0).length
        : state.posts.filter(p => p.teamIds.includes(state.selectedTeam)).length;

      const teamsHtml = teamCards.length
        ? `<div class="teams-grid">${teamCards.map(team => {
            const teamPosts = state.posts
              .filter(p => p.teamIds.includes(team.id))
              .sort((a, b) => getSortTime(b) - getSortTime(a));
            const topPosts = teamPosts.slice(0, 2);
            const latest = teamPosts[0];
            const active = state.selectedTeam === team.id;

            return `
              <article class="team-card ${active ? 'active' : ''}" data-team-id="${team.id}">
                <div class="team-head">
                  <div class="team-badge">${esc(teamInitials(team.label))}</div>
                  <div>
                    <h4>${esc(team.label)}</h4>
                    <small>${teamPosts.length} новостей в ветви</small>
                  </div>
                </div>
                <p>${esc(latest ? latest.title : 'Пока нет новостей по этой команде')}</p>
                <div class="team-tags">
                  ${topPosts.length ? topPosts.map(post => `<span class="pill">${esc(post.title)}</span>`).join('') : '<span class="pill">Пусто</span>'}
                </div>
              </article>
            `;
          }).join('')}</div>`
        : '<div class="empty">Команды не найдены по текущему поиску.</div>';

      els.contentArea.innerHTML = `
        <div class="teams-layout">
          ${teamsHtml}
          <div class="team-feed-head">
            <div>
              <h4>${esc(selectedLabel)}</h4>
              <small>${selectedCount} связанных новостей</small>
            </div>
            <button class="tab" type="button" data-team-id="all">Показать все</button>
          </div>
          ${renderPostGrid(selectedPosts)}
        </div>
      `;

      els.statusText.textContent = `Командных публикаций: ${selectedCount}`;
    }

    function renderTicker() {
      const today = todayIso();
      const sorted = [...state.posts].sort((a, b) => getSortTime(b) - getSortTime(a));
      const todayPosts = sorted.filter(p => p.date === today);
      const source = todayPosts.length ? todayPosts : sorted;
      const items = source.slice(0, 6);

      const html = (items.length ? items : [{ title: 'Новостей пока нет', category: 'news', date: '' }]).map(post => {
        const label = `${post.date === today ? 'Сегодня' : 'Новое'} • ${categoryLabel(post.category)} • ${post.title}`;
        return `<div class="ticker-item"><span class="ticker-dot"></span><span>${esc(label)}</span></div>`;
      }).join('');

      els.tickerGroup.innerHTML = html;
      els.tickerGroupClone.innerHTML = html;
    }

    function renderAll() {
      renderMainTabs();
      renderCategoryTabs();
      renderTicker();
      if (state.view === 'news') {
        renderNewsView();
      } else {
        renderTeamsView();
      }
    }

    function openModal(post) {
      if (!post) return;
      els.modalKicker.textContent = categoryLabel(post.category);
      els.modalTitle.textContent = post.title;
      els.modalText.textContent = post.content || post.excerpt || '';
      els.modalImg.src = post.image || imgFallback(post.title || 'News');
      els.modalImg.alt = post.title;
      els.overlay.classList.add('open');
    }

    function closeModal() {
      els.overlay.classList.remove('open');
    }

    els.mainTabs.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-view]');
      if (!btn) return;
      state.view = btn.dataset.view;
      renderAll();
    });

    els.categoryTabs.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-filter]');
      if (!btn) return;
      state.currentFilter = btn.dataset.filter;
      renderAll();
    });

    els.searchInput.addEventListener('input', renderAll);
    els.sortSelect.addEventListener('change', renderAll);

    els.toggleLayoutBtn.addEventListener('click', () => {
      state.compact = !state.compact;
      els.toggleLayoutBtn.textContent = state.compact ? 'Карточки' : 'Компактно';
      renderAll();
    });

    els.contentArea.addEventListener('click', (e) => {
      const postCard = e.target.closest('[data-post-index]');
      if (postCard) {
        const post = state.visible[Number(postCard.dataset.postIndex)];
        if (post) openModal(post);
        return;
      }

      const teamCard = e.target.closest('[data-team-id]');
      if (teamCard) {
        const teamId = teamCard.dataset.teamId;
        if (teamId === 'all') {
          state.selectedTeam = 'all';
        } else {
          state.selectedTeam = teamId;
        }
        renderAll();
        document.getElementById('contentPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });

    els.overlay.addEventListener('click', (e) => {
      if (e.target === els.overlay) closeModal();
    });

    els.closeModal.addEventListener('click', closeModal);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    renderAll();
    loadAllPosts();
  </script>
</body>
</html>
